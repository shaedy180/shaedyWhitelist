name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Which version of this plugin are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: css-version
    attributes:
      label: CounterStrikeSharp Version
      description: Which CounterStrikeSharp version are you running?
      placeholder: e.g. v316
    validations:
      required: true

  - type: input
    id: cs2-version
    attributes:
      label: CS2 Server Version
      description: Which CS2 server build are you running?
      placeholder: e.g. 1.40.8.3
    validations:
      required: false

  - type: dropdown
    id: server-os
    attributes:
      label: Server Operating System
      options:
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can this bug be reproduced?
      placeholder: |
        1. Start the server with the plugin loaded
        2. Do X
        3. Observe Y
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Plugin Configuration
      description: Paste your plugin configuration (JSON) here if relevant. This will be formatted as code automatically.
      render: json
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Paste any relevant server log output or error messages here. This will be formatted as code automatically.
      render: text
    validations:
      required: false

  - type: textarea
    id: other-plugins
    attributes:
      label: Other Installed Plugins
      description: List any other CounterStrikeSharp plugins you have installed. This helps identify potential conflicts.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (screenshots, videos, etc.).
    validations:
      required: false