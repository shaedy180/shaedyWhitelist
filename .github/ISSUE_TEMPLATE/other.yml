name: Other
description: General questions, ideas, or anything that does not fit another template
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for anything that does not fit the other categories.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe your question, idea, or topic.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other details that might be relevant.
    validations:
      required: false